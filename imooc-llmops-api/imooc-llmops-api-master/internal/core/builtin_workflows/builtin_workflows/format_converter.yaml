    - id: "55555555-1111-1111-1111-000000000002"
      node_type: "code"
      title: "解析数据"
      description: "解析JSON数据并转换格式"
      position:
        x: 300
        y: 200
      code: "import json\n\ndef main(params):\n    json_data = params.get('json_data', '{}')\n    output_format = params.get('output_format', 'markdown_table')\n    \n    try:\n        data = json.loads(json_data)\n    except json.JSONDecodeError:\n        return {'result': 'JSON解析错误，请检查输入格式', 'status': 'error'}\n    \n    if output_format == 'csv':\n        if isinstance(data, list) and len(data) > 0:\n            headers = list(data[0].keys())\n            lines = [','.join(headers)]\n            for row in data:\n                lines.append(','.join(str(row.get(h, '')) for h in headers))\n            return {'result': '\\n'.join(lines), 'status': 'success'}\n        else:\n            return {'result': json.dumps(data, ensure_ascii=False), 'status': 'success'}\n    elif output_format == 'yaml':\n        if isinstance(data, dict):\n            lines = []\n            for k, v in data.items():\n                lines.append(f'{k}: {v}')\n            return {'result': '\\n'.join(lines), 'status': 'success'}\n        else:\n            return {'result': json.dumps(data, ensure_ascii=False, indent=2), 'status': 'success'}\n    else:\n        if isinstance(data, list) and len(data) > 0:\n            headers = list(data[0].keys())\n            lines = ['| ' + ' | '.join(headers) + ' |']\n            lines.append('| ' + ' | '.join(['---'] * len(headers)) + ' |')\n            for row in data:\n                lines.append('| ' + ' | '.join(str(row.get(h, '')) for h in headers) + ' |')\n            return {'result': '\\n'.join(lines), 'status': 'success'}\n        else:\n            return {'result': json.dumps(data, ensure_ascii=False, indent=2), 'status': 'success'}\n"
