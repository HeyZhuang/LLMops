services:
  postgres:
    image: postgres:15
    container_name: llmops-postgres
    restart: always
    environment:
      POSTGRES_DB: llmops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe123!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llmops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: llmops-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  weaviate:
    image: semitechnologies/weaviate:1.23.7
    container_name: llmops-weaviate
    restart: always
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: "text2vec-openai,text2vec-cohere,text2vec-huggingface,ref2vec-centroid,generative-openai,qna-openai"
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate

  llmops-api:
    build:
      context: ./imooc-llmops-api/imooc-llmops-api-master
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
    container_name: llmops-api
    restart: always
    env_file:
      - ./imooc-llmops-api/imooc-llmops-api-master/.env
    command: python -m gunicorn --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 120 app.http.app:app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started

  celery-worker:
    build:
      context: ./imooc-llmops-api/imooc-llmops-api-master
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
    container_name: llmops-celery
    restart: always
    env_file:
      - ./imooc-llmops-api/imooc-llmops-api-master/.env
    command: celery -A app.http.app:celery worker --loglevel=info --concurrency=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started

  llmops-ui:
    build:
      context: ./imooc-llmops-ui/imooc-llmops-ui-master
      dockerfile: Dockerfile
      args:
        VITE_API_PREFIX: /api
    container_name: llmops-ui
    restart: always
    depends_on:
      - llmops-api

  nginx:
    image: nginx:alpine
    container_name: llmops-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - llmops-ui
      - llmops-api

volumes:
  postgres_data:
  redis_data:
  weaviate_data:
